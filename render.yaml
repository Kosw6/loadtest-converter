# Render Blueprint — loadtest-converter
# 배포 순서:
#   1. Go API (Web Service) 먼저 배포 → URL 확인
#   2. React UI (Static Site) 배포 시 VITE_API_URL에 API URL 입력

services:
  # ── Go API 서버 — Web Service ──────────────────────────────────────────
  - type: web
    name: loadtest-converter-api
    runtime: go
    rootDir: server
    buildCommand: go build -o app .
    startCommand: ./app
    plan: free
    # free tier: 15분 idle 시 sleep, 첫 요청 cold start ~1-2초

  # ── React UI — Static Site ─────────────────────────────────────────────
  - type: static
    name: loadtest-converter-ui
    rootDir: ui
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # SPA 라우팅 — 모든 경로를 index.html로 rewrite
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Go API의 Render URL 입력 (예: https://loadtest-converter-api.onrender.com)
      # 빌드 전에 반드시 설정해야 함 (Vite가 빌드 시 env를 정적으로 주입)
      - key: VITE_API_URL
        sync: false
